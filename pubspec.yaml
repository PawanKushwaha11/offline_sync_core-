name: offline_sync_core
description: A robust, lightweight, and extensible offline-first caching and synchronization package for Flutter using Hive.
version: 0.0.1
repository: https://github.com/AmarJeet/offline_sync_core
issue_tracker: https://github.com/AmarJeet/offline_sync_core/issues

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # Cache Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # SQLite Database
  sqflite: ^2.4.2

  # Database path
  path: ^1.9.1

  # Device storage path
  path_provider: ^2.1.5

  # Internet status detect
  connectivity_plus: ^6.1.4

  # Background task / auto sync
  workmanager: ^0.7.0

  # Generate unique IDs
  uuid: ^4.5.1

  # Encryption & hashing
  crypto: ^3.0.6

  # Thread-safe operations
  synchronized: ^3.3.1

  # State management
  rxdart: ^0.28.0

  # Logging
  logger: ^2.5.0

  # JSON serialization
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13

  json_serializable: ^6.9.0


