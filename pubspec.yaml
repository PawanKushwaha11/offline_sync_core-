name: offline_sync_core
description: A robust, lightweight, and extensible offline-first caching and synchronization package for Flutter using Hive.
version: 0.1.5
repository: https://github.com/PawanKushwaha11/offline_sync_core-
issue_tracker: https://github.com/PawanKushwaha11/offline_sync_core-/issues

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  workmanager: ^0.7.0
  uuid: ^4.5.1
  crypto: ^3.0.6
  synchronized: ^3.3.1
  rxdart: ^0.28.0
  logger: ^2.5.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
